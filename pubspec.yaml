name: bandait
description: Bandait is a mission-critical real-time synchronization tool for bands using Flutter and WebSockets.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  web_socket_channel: ^2.4.0
  rxdart: ^0.27.7
  equatable: ^2.0.5
  get_it: ^7.6.0
  injectable: ^2.3.2
  logging: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.8
  injectable_generator: ^2.4.1
