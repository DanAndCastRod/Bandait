<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Musician Stage View</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00ffa6",
                        "background-light": "#f9fafa",
                        "background-dark": "#000000",
                        "surface-dark": "#0f241d",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                    boxShadow: {
                        'neon': '0 0 20px rgba(0, 255, 166, 0.4)',
                        'neon-text': '0 0 10px rgba(0, 255, 166, 0.5)',
                        'inner-pulse': 'inset 0 0 30px rgba(0, 255, 166, 0.1)',
                    },
                    animation: {
                        'pulse-beat': 'pulse-beat 0.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        'pulse-beat': {
                            '0%, 100%': { opacity: '1' },
                            '50%': { opacity: '.7' },
                        }
                    }
                },
            },
        }
    </script>
<style>
        /* Custom styles for specific requirements */
        .oled-black {
            background-color: #000000;
        }
        
        /* Simulating the hardware-accelerated edge flash */
        .edge-flash {
            box-shadow: inset 0 0 0 0 rgba(0, 255, 166, 0);
            animation: flash-border 2s infinite; /* 120 BPM = 0.5s per beat * 4 for full measure or per beat */
            animation-duration: 0.5s; /* 120 BPM */
        }

        @keyframes flash-border {
            0% { box-shadow: inset 0 0 0 4px rgba(0, 255, 166, 0.6); }
            100% { box-shadow: inset 0 0 0 0 rgba(0, 255, 166, 0); }
        }

        /* VFD Display Glow Effect */
        .vfd-glow {
            text-shadow: 0 0 15px rgba(0, 255, 166, 0.6), 0 0 30px rgba(0, 255, 166, 0.3);
        }
        
        /* Hide scrollbar for cleaner look */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased overflow-hidden h-screen w-full flex flex-col select-none">
<!-- Edge Flash Container - Simulating the beat pulse on the edges -->
<div class="absolute inset-0 pointer-events-none edge-flash z-50 rounded-none sm:rounded-3xl mix-blend-screen"></div>
<!-- Main Container -->
<div class="relative flex flex-col h-full w-full max-w-md mx-auto bg-black text-white p-6 justify-between">
<!-- Header: Status & Lock -->
<header class="flex items-center justify-between w-full z-10 pt-2">
<!-- Network Status -->
<div class="flex items-center gap-3 bg-[#111] border border-[#222] rounded-full px-4 py-2">
<div class="relative flex items-center justify-center size-3">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"></span>
<span class="relative inline-flex rounded-full size-2.5 bg-primary"></span>
</div>
<span class="text-xs font-bold tracking-widest text-primary">LINKED</span>
</div>
<!-- Lock Indicator -->
<div class="text-[#333] flex items-center justify-center size-10 rounded-full border border-[#222] bg-[#0a0a0a]">
<span aria-hidden="true" class="material-symbols-outlined text-[20px]">lock</span>
</div>
</header>
<!-- Song Context -->
<section class="flex flex-col items-center justify-center w-full mt-8 space-y-2 z-10">
<h2 class="text-white tracking-widest text-sm font-bold uppercase text-center opacity-60">Next Up</h2>
<div class="flex flex-col items-center">
<h1 class="text-white text-3xl font-bold leading-tight text-center uppercase tracking-wide">Midnight Drive</h1>
<div class="flex items-center gap-2 mt-2 bg-white/5 px-3 py-1 rounded">
<span class="material-symbols-outlined text-primary text-[16px]">timer</span>
<span class="text-primary font-mono text-sm font-bold">120 BPM</span>
</div>
</div>
</section>
<!-- The Beat / Countdown -->
<main class="flex-1 flex items-center justify-center relative z-0 py-8">
<!-- Background Radial Glow -->
<div class="absolute w-64 h-64 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<!-- Main Counter -->
<div class="relative flex flex-col items-center justify-center">
<!-- Large Countdown Number -->
<span class="text-[160px] font-bold leading-none text-primary vfd-glow tabular-nums tracking-tighter scale-100 transition-transform duration-75">
                    3
                </span>
<!-- Beat indicators (dots) -->
<div class="flex gap-4 mt-6">
<div class="w-3 h-3 rounded-full bg-primary shadow-neon"></div>
<div class="w-3 h-3 rounded-full bg-[#222]"></div>
<div class="w-3 h-3 rounded-full bg-[#222]"></div>
<div class="w-3 h-3 rounded-full bg-[#222]"></div>
</div>
</div>
</main>
<!-- Lyrics Deck -->
<footer class="w-full flex flex-col gap-6 pb-8 z-10">
<!-- Current Line -->
<div class="w-full">
<p class="text-white text-[32px] sm:text-[40px] font-medium leading-[1.1] text-center tracking-tight drop-shadow-lg">
                    We're running down the lights
                </p>
</div>
<!-- Next Line -->
<div class="w-full border-t border-white/10 pt-4">
<div class="flex items-center justify-center gap-2 mb-1">
<span class="material-symbols-outlined text-[#444] text-[16px]">skip_next</span>
<span class="text-[#444] text-xs font-bold uppercase tracking-widest">Next Line</span>
</div>
<p class="text-[#444] text-xl sm:text-2xl font-normal leading-normal text-center truncate px-4">
                    Chasing shadows in the night
                </p>
</div>
</footer>
<!-- Bottom Safe Area Indicator (iOS home bar area visual hint) -->
<div class="absolute bottom-2 left-1/2 transform -translate-x-1/2 w-1/3 h-1 bg-[#111] rounded-full z-0"></div>
</div>
</body></html>
