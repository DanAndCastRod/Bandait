<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Band Sync - Profile Selection</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00ffa6",
                        "neon-pink": "#FF00FF",
                        "background-light": "#f5f8f7", // Kept for config compliance
                        "background-dark": "#000000", // OLED Black override
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                    boxShadow: {
                        'neon-green': '0 0 10px #00ffa6, 0 0 20px #00ffa633',
                        'neon-pink': '0 0 5px #FF00FF, inset 0 0 5px #FF00FF33',
                    }
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar hiding for cleaner mobile view */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* Custom animations */
        @keyframes pulse-glow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse-slow {
            animation: pulse-glow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-black font-display text-white min-h-screen flex flex-col antialiased overflow-x-hidden selection:bg-primary selection:text-black">
<!-- Status Bar / Top Nav -->
<div class="flex justify-between items-center px-6 py-4">
<div class="flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-primary animate-pulse shadow-[0_0_8px_#00ffa6]"></span>
<span class="text-xs font-medium tracking-widest text-primary/80">SYNC READY</span>
</div>
<div class="text-xs font-mono text-gray-500">v2.4.0</div>
</div>
<!-- Main Content -->
<div class="flex-1 flex flex-col max-w-md mx-auto w-full px-5 pt-4 pb-8">
<!-- Header Section -->
<header class="mb-10 text-center relative">
<h1 class="text-4xl font-bold tracking-tight leading-none mb-2 text-white drop-shadow-[0_0_10px_rgba(255,255,255,0.3)]">
                WHO ARE YOU<br/>
<span class="text-transparent bg-clip-text bg-gradient-to-r from-primary to-emerald-400">TONIGHT?</span>
</h1>
<p class="text-gray-400 text-sm font-light">Set your alias for the session log.</p>
</header>
<!-- Input Section -->
<div class="mb-10 relative group">
<div class="absolute -inset-0.5 bg-gradient-to-r from-primary/30 to-neon-pink/30 rounded-lg blur opacity-20 group-focus-within:opacity-75 transition duration-500"></div>
<div class="relative bg-[#0a0a0a] rounded-lg p-1 border border-white/10 group-focus-within:border-primary/50 transition-colors">
<label class="sr-only" for="nickname">Nickname</label>
<div class="flex items-center px-3">
<span class="material-symbols-outlined text-gray-500 mr-2">terminal</span>
<input autocomplete="off" class="w-full bg-transparent border-none text-white placeholder-gray-600 focus:ring-0 text-lg font-medium tracking-wide h-12 caret-primary" id="nickname" placeholder="ENTER STAGE NAME..." type="text"/>
</div>
</div>
</div>
<!-- Instrument Grid -->
<div class="flex-1">
<label class="block text-xs font-mono text-gray-500 mb-4 uppercase tracking-widest">Select Instrument</label>
<div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
<!-- Drums: Selected State Example -->
<button class="group relative flex flex-col items-center justify-center aspect-square rounded-lg bg-[#00ffa6]/10 border border-primary shadow-neon-green transition-all duration-300">
<div class="absolute top-2 right-2 w-1.5 h-1.5 bg-primary rounded-full shadow-[0_0_5px_#00ffa6]"></div>
<span class="material-symbols-outlined text-4xl mb-2 text-primary group-hover:scale-110 transition-transform duration-300">lens_blur</span>
<span class="text-sm font-bold tracking-wider text-primary">DRUMS</span>
</button>
<!-- Bass: Unselected State -->
<button class="group relative flex flex-col items-center justify-center aspect-square rounded-lg bg-black border border-neon-pink/50 text-neon-pink hover:bg-neon-pink/5 hover:border-neon-pink hover:shadow-neon-pink transition-all duration-300">
<span class="material-symbols-outlined text-4xl mb-2 group-hover:scale-110 transition-transform duration-300">graphic_eq</span>
<span class="text-sm font-bold tracking-wider opacity-80 group-hover:opacity-100">BASS</span>
</button>
<!-- E. Guitar: Unselected State -->
<button class="group relative flex flex-col items-center justify-center aspect-square rounded-lg bg-black border border-neon-pink/50 text-neon-pink hover:bg-neon-pink/5 hover:border-neon-pink hover:shadow-neon-pink transition-all duration-300">
<span class="material-symbols-outlined text-4xl mb-2 group-hover:scale-110 transition-transform duration-300">bolt</span>
<span class="text-sm font-bold tracking-wider opacity-80 group-hover:opacity-100">E. GUITAR</span>
</button>
<!-- A. Guitar: Unselected State -->
<button class="group relative flex flex-col items-center justify-center aspect-square rounded-lg bg-black border border-neon-pink/50 text-neon-pink hover:bg-neon-pink/5 hover:border-neon-pink hover:shadow-neon-pink transition-all duration-300">
<span class="material-symbols-outlined text-4xl mb-2 group-hover:scale-110 transition-transform duration-300">music_note</span>
<span class="text-sm font-bold tracking-wider opacity-80 group-hover:opacity-100">A. GUITAR</span>
</button>
<!-- Keys: Unselected State -->
<button class="group relative flex flex-col items-center justify-center aspect-square rounded-lg bg-black border border-neon-pink/50 text-neon-pink hover:bg-neon-pink/5 hover:border-neon-pink hover:shadow-neon-pink transition-all duration-300">
<span class="material-symbols-outlined text-4xl mb-2 group-hover:scale-110 transition-transform duration-300">piano</span>
<span class="text-sm font-bold tracking-wider opacity-80 group-hover:opacity-100">KEYS</span>
</button>
<!-- Vocals: Unselected State -->
<button class="group relative flex flex-col items-center justify-center aspect-square rounded-lg bg-black border border-neon-pink/50 text-neon-pink hover:bg-neon-pink/5 hover:border-neon-pink hover:shadow-neon-pink transition-all duration-300">
<span class="material-symbols-outlined text-4xl mb-2 group-hover:scale-110 transition-transform duration-300">mic_external_on</span>
<span class="text-sm font-bold tracking-wider opacity-80 group-hover:opacity-100">VOCALS</span>
</button>
<!-- Sax: Unselected State (Full width on even grid or just last item) -->
<button class="col-span-2 sm:col-span-1 group relative flex flex-row sm:flex-col items-center justify-center aspect-[2/1] sm:aspect-square rounded-lg bg-black border border-neon-pink/50 text-neon-pink hover:bg-neon-pink/5 hover:border-neon-pink hover:shadow-neon-pink transition-all duration-300">
<span class="material-symbols-outlined text-4xl mr-3 sm:mr-0 sm:mb-2 group-hover:scale-110 transition-transform duration-300">wind_power</span>
<span class="text-sm font-bold tracking-wider opacity-80 group-hover:opacity-100">SAX</span>
</button>
</div>
</div>
<!-- Sticky Bottom CTA -->
<div class="mt-8 pt-4 sticky bottom-4 z-10">
<!-- Disabled/Waiting State Background -->
<div class="absolute inset-0 bg-gradient-to-t from-black via-black to-transparent -z-10 h-32 -top-16 pointer-events-none"></div>
<button class="w-full relative overflow-hidden h-16 rounded-lg bg-primary text-black font-bold text-lg tracking-[0.15em] hover:bg-white transition-colors duration-300 shadow-[0_0_20px_#00ffa680] group flex items-center justify-center">
<!-- Glitch effect container -->
<span class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300 skew-y-12"></span>
<span class="relative z-10 flex items-center gap-3">
<span>JOIN SESSION</span>
<span class="material-symbols-outlined text-2xl animate-pulse">arrow_forward</span>
</span>
</button>
<p class="text-center text-[10px] text-gray-600 font-mono mt-3 uppercase tracking-widest">BandSync Protocol v.2.4 Active</p>
</div>
</div>
<!-- Background Noise/Texture Simulation -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] z-50 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')]" data-alt="Subtle noise texture overlay"></div>
</body></html>
