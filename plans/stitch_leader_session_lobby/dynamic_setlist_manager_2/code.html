<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Rehearsal Loop Mode</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    "primary": "#00ffa6",
                    "primary-dim": "#00cc85",
                    "background-light": "#f9fafa",
                    "background-dark": "#000000","surface-dark": "#111111","panic": "#E04456",
                },
                fontFamily: {
                    "display": ["Space Grotesk", "sans-serif"],
                    "mono": ["ui-monospace", "SFMono-Regular", "Menlo", "Monaco", "Consolas", "monospace"],
                },
                boxShadow: {
                    'glow': '0 0 20px rgba(0, 255, 166, 0.25)',
                    'glow-strong': '0 0 30px rgba(0, 255, 166, 0.4)',
                    'panic-glow': '0 0 15px rgba(224, 68, 86, 0.6)',
                }
            },
        },
    }
</script>
<style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
</style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark font-display text-white overflow-hidden h-screen flex flex-col selection:bg-primary selection:text-black">
<header class="flex-none pt-14 pb-4 px-6 flex items-center justify-between z-20">
<div class="flex flex-col">
<div class="flex items-center gap-2 mb-1 opacity-60">
<span class="material-symbols-outlined !text-[16px]">loop</span>
<span class="text-xs font-mono uppercase tracking-widest">Rehearsal Mode</span>
</div>
<h1 class="text-3xl font-bold tracking-tight leading-none text-white">Midnight City</h1>
<div class="flex items-center gap-3 mt-2">
<div class="flex items-center gap-1.5 bg-white/10 px-2 py-1 rounded text-xs font-mono text-primary">
<span class="material-symbols-outlined !text-[14px]">timer</span>
<span class="tracking-wider font-bold">105 BPM</span>
</div>
<div class="flex items-center gap-1.5 px-2 py-1 rounded text-xs font-mono text-gray-400 border border-white/10">
<span class="tracking-wider">4/4</span>
</div>
</div>
</div>
<button class="group relative flex flex-col items-center justify-center w-[72px] h-[64px] rounded-xl bg-panic/10 border border-panic text-panic shadow-panic-glow active:bg-panic active:text-white active:scale-95 transition-all duration-150 overflow-hidden">
<span class="material-symbols-outlined !text-[28px] font-bold mb-0.5 z-10">pan_zoom</span>
<span class="text-[10px] font-black tracking-widest z-10">PANIC</span>
<div class="absolute inset-0 bg-panic opacity-0 group-hover:opacity-10 transition-opacity"></div>
</button>
</header>
<main class="flex-1 flex flex-col px-6 pb-6 relative overflow-y-auto no-scrollbar">
<div class="mt-4 mb-8 relative w-full h-48 bg-surface-dark rounded-2xl border border-white/10 flex items-center justify-between px-4 overflow-visible select-none">
<div class="absolute top-2 bottom-2 left-[25%] right-[25%] bg-primary/10 border-x border-primary/30 z-0"></div>
<div class="absolute -top-3 bottom-0 left-[25%] z-20 flex flex-col items-center cursor-grab active:cursor-grabbing group">
<div class="bg-primary text-black font-mono text-[10px] font-bold px-1.5 py-0.5 rounded shadow-glow mb-1 scale-110">A</div>
<div class="w-0.5 h-full bg-primary shadow-[0_0_8px_rgba(0,255,166,0.8)]"></div>
<div class="absolute bottom-0 w-6 h-6 -ml-0 bg-transparent"></div> 
</div>
<div class="absolute -top-3 bottom-0 right-[25%] z-20 flex flex-col items-center cursor-grab active:cursor-grabbing group">
<div class="bg-primary text-black font-mono text-[10px] font-bold px-1.5 py-0.5 rounded shadow-glow mb-1 scale-110">B</div>
<div class="w-0.5 h-full bg-primary shadow-[0_0_8px_rgba(0,255,166,0.8)]"></div>
<div class="absolute bottom-0 w-6 h-6 -ml-0 bg-transparent"></div> 
</div>
<div class="w-1.5 h-8 bg-white/10 rounded-full"></div>
<div class="w-1.5 h-12 bg-white/10 rounded-full"></div>
<div class="w-1.5 h-6 bg-white/10 rounded-full"></div>
<div class="w-1.5 h-16 bg-white/10 rounded-full"></div>
<div class="w-1.5 h-10 bg-white/10 rounded-full"></div>
<div class="w-1.5 h-5 bg-white/10 rounded-full"></div>
<div class="w-1.5 h-14 bg-white/10 rounded-full"></div>
<div class="w-1.5 h-20 bg-primary rounded-full shadow-[0_0_10px_rgba(0,255,166,0.5)] animate-pulse"></div>
<div class="w-1.5 h-32 bg-primary rounded-full shadow-[0_0_10px_rgba(0,255,166,0.5)]"></div>
<div class="w-1.5 h-24 bg-primary rounded-full shadow-[0_0_10px_rgba(0,255,166,0.5)]"></div>
<div class="w-1.5 h-36 bg-primary rounded-full shadow-[0_0_10px_rgba(0,255,166,0.5)]"></div>
<div class="w-1.5 h-28 bg-primary rounded-full shadow-[0_0_10px_rgba(0,255,166,0.5)]"></div>
<div class="w-1.5 h-16 bg-primary rounded-full shadow-[0_0_10px_rgba(0,255,166,0.5)]"></div>
<div class="w-1.5 h-24 bg-primary rounded-full shadow-[0_0_10px_rgba(0,255,166,0.5)]"></div>
<div class="w-1.5 h-32 bg-primary rounded-full shadow-[0_0_10px_rgba(0,255,166,0.5)]"></div>
<div class="w-1.5 h-14 bg-primary rounded-full shadow-[0_0_10px_rgba(0,255,166,0.5)]"></div>
<div class="w-1.5 h-10 bg-white/10 rounded-full"></div>
<div class="w-1.5 h-20 bg-white/10 rounded-full"></div>
<div class="w-1.5 h-8 bg-white/10 rounded-full"></div>
<div class="w-1.5 h-12 bg-white/10 rounded-full"></div>
<div class="w-1.5 h-6 bg-white/10 rounded-full"></div>
<div class="w-1.5 h-14 bg-white/10 rounded-full"></div>
<div class="w-1.5 h-4 bg-white/10 rounded-full"></div>
</div>
<div class="flex items-center justify-between mb-8 px-2">
<div class="flex items-center gap-3">
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-14 h-8 bg-white/10 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[4px] after:start-[4px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-primary shadow-glow"></div>
<span class="ms-3 text-sm font-bold uppercase tracking-wider text-white">Loop Active</span>
</label>
</div>
<div class="font-mono text-primary text-sm">
            01:45 <span class="text-white/30">/</span> 04:12
        </div>
</div>
<div class="flex items-center justify-between gap-4 mb-10 px-2">
<button class="flex-1 h-20 rounded-2xl bg-surface-dark border border-white/10 hover:bg-white/5 active:scale-95 transition-all flex flex-col items-center justify-center group">
<span class="material-symbols-outlined !text-[32px] text-white/70 group-hover:text-white mb-1">skip_previous</span>
<span class="text-[10px] font-mono text-white/40 uppercase tracking-widest">Prev Sect</span>
</button>
<button class="size-24 rounded-full bg-primary text-black flex items-center justify-center hover:bg-white hover:scale-105 active:scale-95 transition-all shadow-glow-strong z-10 mx-2">
<span class="material-symbols-outlined !text-[48px] fill-1 ml-1">play_arrow</span>
</button>
<button class="flex-1 h-20 rounded-2xl bg-surface-dark border border-white/10 hover:bg-white/5 active:scale-95 transition-all flex flex-col items-center justify-center group">
<span class="material-symbols-outlined !text-[32px] text-white/70 group-hover:text-white mb-1">skip_next</span>
<span class="text-[10px] font-mono text-white/40 uppercase tracking-widest">Next Sect</span>
</button>
</div>
<div class="flex-1 flex flex-col">
<h3 class="text-xs font-bold text-white/50 uppercase tracking-widest mb-4 px-1">Jump to Section</h3>
<div class="grid grid-cols-2 gap-3 pb-20">
<button class="h-14 rounded-lg bg-surface-dark border border-white/5 hover:border-white/20 active:bg-white/5 flex items-center justify-between px-4 transition-all group">
<span class="font-bold text-sm">Intro</span>
<span class="font-mono text-xs text-white/30 group-hover:text-white/60">0:00</span>
</button>
<button class="h-14 rounded-lg bg-surface-dark border border-white/5 hover:border-white/20 active:bg-white/5 flex items-center justify-between px-4 transition-all group">
<span class="font-bold text-sm">Verse 1</span>
<span class="font-mono text-xs text-white/30 group-hover:text-white/60">0:32</span>
</button>
<button class="relative h-14 rounded-lg bg-surface-dark border-l-4 border-primary shadow-[inset_0_0_20px_rgba(0,255,166,0.05)] flex items-center justify-between px-4 transition-all">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined !text-[16px] text-primary animate-spin">sync</span>
<span class="font-bold text-sm text-primary">Chorus</span>
</div>
<span class="font-mono text-xs text-primary">1:15</span>
<div class="absolute inset-0 bg-primary/5 pointer-events-none rounded-r-lg"></div>
</button>
<button class="h-14 rounded-lg bg-surface-dark border border-white/5 hover:border-white/20 active:bg-white/5 flex items-center justify-between px-4 transition-all group">
<span class="font-bold text-sm">Verse 2</span>
<span class="font-mono text-xs text-white/30 group-hover:text-white/60">1:45</span>
</button>
<button class="h-14 rounded-lg bg-surface-dark border border-white/5 hover:border-white/20 active:bg-white/5 flex items-center justify-between px-4 transition-all group">
<span class="font-bold text-sm">Bridge</span>
<span class="font-mono text-xs text-white/30 group-hover:text-white/60">2:15</span>
</button>
<button class="h-14 rounded-lg bg-surface-dark border border-white/5 hover:border-white/20 active:bg-white/5 flex items-center justify-between px-4 transition-all group">
<span class="font-bold text-sm">Outro</span>
<span class="font-mono text-xs text-white/30 group-hover:text-white/60">3:30</span>
</button>
</div>
</div>
</main>
<nav class="flex-none h-[88px] bg-[#050505] border-t border-white/10 flex items-start justify-around pt-3 pb-8 z-30">
<button class="flex flex-col items-center gap-1.5 w-20 group">
<div class="relative">
<span class="material-symbols-outlined !text-[26px] text-primary transition-colors">queue_music</span>
<div class="absolute -bottom-2 left-1/2 -translate-x-1/2 w-1 h-1 bg-primary rounded-full"></div>
</div>
<span class="text-[10px] font-bold text-primary tracking-wide">Setlist</span>
</button>
<button class="flex flex-col items-center gap-1.5 w-20 group">
<div class="relative">
<span class="material-symbols-outlined !text-[26px] text-gray-600 group-hover:text-white transition-colors">graphic_eq</span>
</div>
<span class="text-[10px] font-medium text-gray-600 group-hover:text-white transition-colors">Mixer</span>
</button>
<button class="flex flex-col items-center gap-1.5 w-20 group">
<div class="relative">
<span class="material-symbols-outlined !text-[26px] text-gray-600 group-hover:text-white transition-colors">settings_input_component</span>
</div>
<span class="text-[10px] font-medium text-gray-600 group-hover:text-white transition-colors">Settings</span>
</button>
</nav>
