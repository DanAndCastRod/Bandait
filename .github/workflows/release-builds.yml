name: Release Builds (Android APK + Windows)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Build Android APK
  # ──────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK
        run: flutter build apk --release --no-shrink
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dkotlin.daemon.jvm.options=-Xmx1536m"

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          token: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────
  # JOB 2: Build Windows Executable
  # ──────────────────────────────────────────────
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows release
        run: flutter build windows --release

      - name: Archive Windows build
        run: Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "bandait-windows-x64.zip"
        shell: pwsh

      - name: Upload Windows ZIP to Release
        uses: softprops/action-gh-release@v2
        with:
          files: bandait-windows-x64.zip
          token: ${{ secrets.GITHUB_TOKEN }}
